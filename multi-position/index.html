<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Position Allocation Calculator (Multi Trades)</title>
<link rel="stylesheet" href="style.css">
    <meta name="google-site-verification" content="PkLa_ViOo6FAHpvh8SacceMb95o9tePRdrqLNBz9X1M" />
</head>
<body>

<h1>Position Allocation Calculator (Multi Trades)</h1>

<p>Allocate capital efficiently across your options trades.</p>


<label>Capital:</label><input id="capital" type="number">
<label>Position 1 %:</label><input id="p1" type="number">
<label>Position 2 %:</label><input id="p2" type="number">


<button onclick="calc()">Calculate</button>

<p id="result"></p>

<canvas id="chart" width="500" height="300"></canvas>

<script>
function calc(){

let capital=parseFloat(document.getElementById('capital').value)||0;
let p1=parseFloat(document.getElementById('p1').value)||0;
let p2=parseFloat(document.getElementById('p2').value)||0;
let pos1 = capital*(p1/100);
let pos2 = capital*(p2/100);
let result = "Position1: "+pos1+" | Position2: "+pos2;

document.getElementById('result').innerText=result;

// simple visualization
let canvas=document.getElementById('chart');
let ctx=canvas.getContext('2d');
ctx.clearRect(0,0,500,300);
ctx.beginPath();

for(let x=0;x<500;x++){
  let y=150 - (x/10);
  if(x===0) ctx.moveTo(x,y);
  else ctx.lineTo(x,y);
}

ctx.stroke();
}
</script>

</body>
</html>
